name: README anti-LLM-slop lint

# Runs `tools/md_lint.py` against README.md on every push and PR.
# Errors fail the build; warnings are reported but non-blocking.
on:
  push:
    branches: ['**']
    paths:
      - 'README.md'
      - 'tools/md_lint.py'
      - '.github/workflows/md-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'README.md'
      - 'tools/md_lint.py'
      - '.github/workflows/md-lint.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  md-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Lint README.md
        run: python3 tools/md_lint.py README.md --format github
