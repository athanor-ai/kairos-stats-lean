name: Pythia simulation sweep

# Every PR runs the full per-theorem PBT + sweep + mutation harness
# across every entry in tools/sim/theorem_manifest.MANIFEST. Catches
# drift between the formal Lean theorem and the empirical companion
# when mathlib bumps or a domain harness goes stale.
#
# Also measures Python tooling coverage (tools/) and uploads to
# Codecov so contributors can see what test gaps exist before
# proposing new theorems / runners.
#
# Distinct from the Lean Build + Axiom Audit workflow: this one is
# Python-only (no lake / no Lean toolchain), runs in seconds, and
# fires on every push including documentation PRs.
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pythia-sim:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install test deps (pytest + coverage + hypothesis)
        # Pin major versions. pyproject.toml has NO `[project]` table
        # (see comment there); we install dependencies directly
        # rather than via `pip install .[test]` to avoid setuptools
        # auto-discovery tripping on top-level `Pythia/` and `demo/`.
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            'pytest>=8.0' \
            'pytest-cov>=5.0' \
            'hypothesis>=6.100'
      - name: Manifest sweep — every theorem's harness pytest
        run: |
          set -e
          python3 tools/run_pythia_sim.py
      - name: Tool unit + property tests with coverage
        # Single pytest invocation across all tools/ tests so coverage
        # data accumulates into one report. Individual sub-suite runs
        # were splitting coverage and underreporting. The
        # markdown_doctest harness is excluded: it needs `lake env
        # lean` (Lean toolchain) which this Python-only sim CI does
        # NOT install. The doctest gate runs in lean-build.yml where
        # the toolchain is present.
        run: |
          python3 -m pytest tools/ -v \
            --ignore=tools/markdown_doctest \
            --cov=tools \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60
        env:
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib
      - name: Upload coverage to Codecov
        # Codecov action is no-token for public repos. Best-effort —
        # tolerate Codecov outages without failing the sweep.
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: ./coverage.xml
          flags: tools
          fail_ci_if_error: false

